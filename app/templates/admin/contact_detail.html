{% extends "base.html" %}
{% block title %}Message Detail{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold mb-3">{{ contact.subject or 'No subject' }}</h1>
        <p class="mb-1"><strong>From:</strong> {{ contact.name }} &lt;<a href="mailto:{{ contact.email }}">{{ contact.email }}</a>&gt;</p>
        <p class="text-muted"><strong>Received:</strong> {{ contact.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
        <hr>
        <p style="white-space: pre-wrap;">{{ contact.message }}</p>
        <div class="mt-3">
          <a href="{{ url_for('admin.contacts') }}" class="btn btn-outline-secondary">Back</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
